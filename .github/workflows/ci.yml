name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check evalforge/
      - name: Type check
        run: mypy evalforge/
      - name: Test
        run: pytest -v --tb=short --cov=evalforge --cov-report=term-missing --cov-fail-under=90
      - name: Import check
        run: python3 -c "from evalforge import __version__; print(f'evalforge {__version__} imports OK')"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install bandit
      - name: Security scan
        run: bandit -r evalforge/ -x tests,spaces -ll

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check README builds
        run: python3 -c "open('README.md').read()"
