[tox]
envlist = py312, py313, lint, typecheck
skip_missing_interpreters = true

[testenv]
deps =
    pytest>=8.0
    pytest-cov>=4.0
commands =
    pytest -v --tb=short --cov=evalforge --cov-report=term-missing --cov-fail-under=90 {posargs}

[testenv:lint]
deps = ruff>=0.3
commands = ruff check evalforge/ {posargs}

[testenv:typecheck]
deps =
    mypy>=1.8
commands = mypy evalforge/ --strict {posargs}
